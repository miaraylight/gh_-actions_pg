name: Reusable .Net Test Workflow
on:
  workflow_call:
    inputs:
      dotnet_version:
        required: false
        type: string
        default: "8.0.405"
    secrets:
      TEAMS_WEBHOOK:
        required: true
jobs:
  test:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet_version }}
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore
      - name: Run Tests
        id: run_tests
        run: |
          dotnet test --logger "console;verbosity=minimal" > test_output.txt
        continue-on-error: true
      - name: Extract Test Summary
        id: summary
        if: always()
        run: |
          TOTAL=$(grep "Total tests:" test_output.txt | awk '{print $3}')
          PASSED=$(grep "Passed:" test_output.txt | awk '{print $2}')
          FAILED=$(grep "Failed:" test_output.txt | awk '{print $2}')
          SKIPPED=$(grep "Skipped:" test_output.txt | awk '{print $2}')
          echo "TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "PASSED=$PASSED" >> $GITHUB_ENV
          echo "FAILED=$FAILED" >> $GITHUB_ENV
          echo "SKIPPED=$SKIPPED" >> $GITHUB_ENV
      - name: Upload Test Output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test_output.txt
      - name: Send Teams Adaptive Card
        if: always()
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [ "$FAILED" = "0" ]; then
            COLOR="2EB886"
            STATUS="SUCCESS"
          else
            COLOR="D13438"
            STATUS="FAILED"
          fi
          curl -H "Content-Type: application/json" \
          -d "{
            \"type\": \"message\",
            \"attachments\": [
              {
                \"contentType\": \"application/vnd.microsoft.card.adaptive\",
                \"content\": {
                  \"\$schema\": \"http://adaptivecards.io/schemas/adaptive-card.json\",
                  \"type\": \"AdaptiveCard\",
                  \"version\": \"1.4\",
                  \"body\": [
                    {
                      \"type\": \"TextBlock\",
                      \"text\": \"Nightly Test Report\",
                      \"weight\": \"Bolder\",
                      \"size\": \"Large\"
                    },
                    {
                      \"type\": \"TextBlock\",
                      \"text\": \"Repository: ${{ github.repository }}\",
                      \"wrap\": true
                    },
                    {
                      \"type\": \"FactSet\",
                      \"facts\": [
                        { \"title\": \"Status:\", \"value\": \"$STATUS\" },
                        { \"title\": \"Total:\", \"value\": \"$TOTAL\" },
                        { \"title\": \"Passed:\", \"value\": \"$PASSED\" },
                        { \"title\": \"Failed:\", \"value\": \"$FAILED\" },
                        { \"title\": \"Skipped:\", \"value\": \"$SKIPPED\" }
                      ]
                    }
                  ],
                  \"actions\": [
                    {
                      \"type\": \"Action.OpenUrl\",
                      \"title\": \"View Full Workflow Run\",
                      \"url\": \"$RUN_URL\"
                    }
                  ]
                }
              }
            ]
          }" \
          ${{ secrets.TEAMS_WEBHOOK }}
