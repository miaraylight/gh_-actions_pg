name: Reusable .NET Test Workflow

on:
  workflow_call:
    inputs:
      dotnet_version:
        required: false
        type: string
        default: "8.0.405"
    secrets:
      TEAMS_WEBHOOK:
        required: true

jobs:
  test:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet_version }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Run Tests (TRX)
        id: run_tests
        run: |
          dotnet test \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory ./TestResults
        continue-on-error: true

      - name: Upload Test Results Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/*.trx

      - name: Extract Test Summary
        if: always()
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-utils
      
          FILE=$(find TestResults -name "*.trx" | head -n 1)
      
          if [ -z "$FILE" ]; then
            echo "No TRX file found."
            echo "TOTAL=0" >> $GITHUB_ENV
            echo "PASSED=0" >> $GITHUB_ENV
            echo "FAILED=1" >> $GITHUB_ENV
            echo "SKIPPED=0" >> $GITHUB_ENV
            echo "DURATION=0" >> $GITHUB_ENV
            echo "PERCENT=0" >> $GITHUB_ENV
            exit 0
          fi
      
          TOTAL=$(xmllint --xpath "string(//*[local-name()='Counters']/@total)" $FILE)
          PASSED=$(xmllint --xpath "string(//*[local-name()='Counters']/@passed)" $FILE)
          FAILED=$(xmllint --xpath "string(//*[local-name()='Counters']/@failed)" $FILE)
          SKIPPED=$(xmllint --xpath "string(//*[local-name()='Counters']/@notExecuted)" $FILE)
          DURATION=$(xmllint --xpath "string(//*[local-name()='Times']/@duration)" $FILE)
      
          if [ -z "$TOTAL" ]; then TOTAL=0; fi
          if [ -z "$PASSED" ]; then PASSED=0; fi
          if [ -z "$FAILED" ]; then FAILED=0; fi
          if [ -z "$SKIPPED" ]; then SKIPPED=0; fi
          if [ -z "$DURATION" ]; then DURATION="N/A"; fi
      
          if [ "$TOTAL" -gt 0 ]; then
            PERCENT=$(awk "BEGIN { printf \"%.2f\", ($PASSED/$TOTAL)*100 }")
          else
            PERCENT=0
          fi
      
          echo "TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "PASSED=$PASSED" >> $GITHUB_ENV
          echo "FAILED=$FAILED" >> $GITHUB_ENV
          echo "SKIPPED=$SKIPPED" >> $GITHUB_ENV
          echo "DURATION=$DURATION" >> $GITHUB_ENV
          echo "PERCENT=$PERCENT" >> $GITHUB_ENV

      - name: Send Teams Adaptive Card
        if: always()
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "${FAILED:-1}" = "0" ]; then
            COLOR="2EB886"
            STATUS="SUCCESS"
          else
            COLOR="D13438"
            STATUS="FAILED"
          fi

          curl -H "Content-Type: application/json" -d "{
            \"type\": \"message\",
            \"attachments\": [
              {
                \"contentType\": \"application/vnd.microsoft.card.adaptive\",
                \"content\": {
                  \"\$schema\": \"http://adaptivecards.io/schemas/adaptive-card.json\",
                  \"type\": \"AdaptiveCard\",
                  \"version\": \"1.4\",
                  \"body\": [
                    {
                      \"type\": \"TextBlock\",
                      \"text\": \"Nightly Test Report\",
                      \"weight\": \"Bolder\",
                      \"size\": \"Large\"
                    },
                    {
                      \"type\": \"TextBlock\",
                      \"text\": \"Repository: ${{ github.repository }}\",
                      \"wrap\": true
                    },
                    {
                      \"type\": \"FactSet\",
                      \"facts\": [
                        { \"title\": \"Status:\", \"value\": \"$STATUS\" },
                        { \"title\": \"Total Tests:\", \"value\": \"$TOTAL\" },
                        { \"title\": \"Passed:\", \"value\": \"$PASSED\" },
                        { \"title\": \"Failed:\", \"value\": \"$FAILED\" },
                        { \"title\": \"Skipped:\", \"value\": \"$SKIPPED\" },
                        { \"title\": \"Pass Rate:\", \"value\": \"$PERCENT%\" },
                        { \"title\": \"Duration:\", \"value\": \"$DURATION\" }
                      ]
                    }
                  ],
                  \"actions\": [
                    {
                      \"type\": \"Action.OpenUrl\",
                      \"title\": \"View Full Workflow Run\",
                      \"url\": \"$RUN_URL\"
                    }
                  ]
                }
              }
            ]
          }" \
          ${{ secrets.TEAMS_WEBHOOK }}
